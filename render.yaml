services:
  - type: web
    name: whatsapp-realtor-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: VERIFY_TOKEN
        value: realtor_bot_secret
